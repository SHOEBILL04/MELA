services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mela-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "1877@sqlserver"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  backend:
    build: ./backend
    container_name: mela-backend
    ports:
      - "5000:5000"
    environment:
      - DB_SERVER=db
      - DB_NAME=MELADB
      - DB_USER=sa
      - DB_PASSWORD=1877@sqlserver
      - PORT=5000
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: mela-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mssql_data:
